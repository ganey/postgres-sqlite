name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        postgres-version: [14, 15, 16, 17, 18]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsqlite3-dev libpq-dev pkg-config

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: make

    - name: Run Test Stub
      env:
        PG_CONNINFO: "host=localhost user=postgres password=password dbname=postgres"
      run: |
        LD_PRELOAD=./sqlite_hook.so ./test_sqlite
